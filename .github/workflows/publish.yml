name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile
      - run: bun run --filter ./packages lint
      - run: bun run --filter ./packages build
      - name: Verify versions match
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          REACT_VERSION=$(node -p "require('./packages/react/package.json').version")
          if [ "$CORE_VERSION" != "${{ inputs.version }}" ] || [ "$REACT_VERSION" != "${{ inputs.version }}" ]; then
            echo "Version mismatch: core=$CORE_VERSION react=$REACT_VERSION expected=${{ inputs.version }}"
            exit 1
          fi
      - name: Publish @simple-presence/core
        working-directory: packages/core
        run: npm publish --provenance --access public
      - name: Publish @simple-presence/react
        working-directory: packages/react
        run: npm publish --provenance --access public
